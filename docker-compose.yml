services:
  backend:
    build: ./backend
    command: ["uv", "run", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8001", "--reload"]
    ports:
      - "8001:8001"
    environment:
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
    volumes:
      - ./backend/app:/app/app

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8001
    depends_on:
      - backend
